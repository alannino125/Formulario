<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Registro de acceso</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Work+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#0F1B1F;
    --panel:#16262B;
    --panel-2:#1D3038;
    --amber:#E8A33D;
    --amber-dim:#8A5F22;
    --sage:#9CCFC2;
    --cream:#F2EFE6;
    --muted:#8FA3A0;
    --line:rgba(242,239,230,0.12);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--ink);
    color:var(--cream);
    font-family:'Work Sans', sans-serif;
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:32px 20px;
  }
  .wrap{
    width:100%;
    max-width:920px;
    display:grid;
    grid-template-columns:1.1fr 1fr;
    gap:0;
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:20px;
    overflow:hidden;
  }
  @media (max-width:760px){
    .wrap{grid-template-columns:1fr;}
  }
  .side{
    padding:48px 40px;
    background:
      radial-gradient(circle at 20% 15%, rgba(232,163,61,0.10), transparent 55%),
      var(--panel-2);
    display:flex;
    flex-direction:column;
    justify-content:center;
    position:relative;
    border-right:1px solid var(--line);
  }
  @media (max-width:760px){
    .side{border-right:none; border-bottom:1px solid var(--line);}
  }
  .eyebrow{
    font-size:12px;
    letter-spacing:.14em;
    text-transform:uppercase;
    color:var(--sage);
    margin:0 0 18px;
  }
  h1{
    font-family:'Fraunces', serif;
    font-weight:500;
    font-size:38px;
    line-height:1.15;
    margin:0 0 18px;
    color:var(--cream);
  }
  .side p{
    color:var(--muted);
    font-size:15px;
    line-height:1.6;
    margin:0;
    max-width:36ch;
  }
  .stamp{
    position:absolute;
    bottom:40px;
    left:40px;
    display:flex;
    align-items:center;
    gap:10px;
    font-family:'Fraunces', serif;
    font-size:13px;
    color:var(--amber-dim);
    border:1px solid var(--amber-dim);
    padding:6px 14px;
    border-radius:999px;
    opacity:.6;
    letter-spacing:.05em;
  }
  .form-side{
    padding:48px 40px;
    display:flex;
    flex-direction:column;
    justify-content:center;
  }
  .field{
    margin-bottom:20px;
  }
  label{
    display:block;
    font-size:13px;
    color:var(--sage);
    margin-bottom:8px;
    letter-spacing:.02em;
  }
  input{
    width:100%;
    padding:13px 14px;
    background:var(--ink);
    border:1px solid var(--line);
    border-radius:10px;
    color:var(--cream);
    font-family:'Work Sans', sans-serif;
    font-size:15px;
    outline:none;
    transition:border-color .15s ease;
  }
  input:focus{
    border-color:var(--amber);
  }
  input::placeholder{color:var(--muted);}
  button{
    width:100%;
    margin-top:8px;
    padding:14px 16px;
    background:var(--amber);
    color:#231202;
    border:none;
    border-radius:10px;
    font-family:'Work Sans', sans-serif;
    font-weight:600;
    font-size:15px;
    cursor:pointer;
    transition:transform .12s ease, background .15s ease;
  }
  button:hover{background:#f0b158;}
  button:active{transform:scale(0.98);}
  button:disabled{opacity:.6; cursor:default;}
  .error{
    color:#E8917A;
    font-size:13px;
    margin-top:10px;
    display:none;
  }
  .confirm{
    display:none;
    text-align:center;
  }
  .seal{
    width:64px;
    height:64px;
    margin:0 auto 20px;
    border:2px solid var(--amber);
    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;
    font-family:'Fraunces', serif;
    font-size:26px;
    color:var(--amber);
    transform:scale(0);
    animation:pop .4s cubic-bezier(.34,1.56,.64,1) forwards;
  }
  @keyframes pop{
    to{transform:scale(1);}
  }
  .confirm h2{
    font-family:'Fraunces', serif;
    font-weight:500;
    font-size:24px;
    margin:0 0 8px;
  }
  .confirm p{
    color:var(--muted);
    font-size:14px;
    margin:0 0 4px;
  }
  .confirm .email{
    color:var(--sage);
  }
  .again{
    margin-top:24px;
    background:transparent;
    border:1px solid var(--line);
    color:var(--muted);
  }
  .again:hover{background:transparent; border-color:var(--muted); color:var(--cream);}
</style>
</head>
<body>

<div class="wrap">
  <div class="side">
    <p class="eyebrow">Acceso</p>
    <h1>Regístrate para continuar</h1>
    <p>Deja tu nombre y tu correo para entrar. Solo toma un segundo.</p>
    <div class="stamp">registro abierto</div>
  </div>

  <div class="form-side">
    <form id="regForm">
      <div class="field">
        <label for="usuario">Correo electrónico</label>
        <input type="email" id="usuario" name="usuario" placeholder="ana@correo.com" autocomplete="email" required>
      </div>
      <div class="field">
        <label for="correo">Contraseña</label>
        <input type="text" id="usuario" name="usuario" placeholder="ana_rodriguez" autocomplete="username" required>
      </div>
      <button type="submit" id="submitBtn">Entrar</button>
      <p class="error" id="errorMsg"></p>
    </form>

    <div class="confirm" id="confirm">
      <div class="seal">✓</div>
      <h2>Listo, ya estás dentro</h2>
      <p>Usuario: <strong id="outUsuario"></strong></p>
      <p>Correo: <span class="email" id="outCorreo"></span></p>
      <button class="again" id="again">Registrar a otra persona</button>
    </div>
  </div>
</div>

<script>
  const form = document.getElementById('regForm');
  const errorMsg = document.getElementById('errorMsg');
  const confirm = document.getElementById('confirm');
  const submitBtn = document.getElementById('submitBtn');

  form.addEventListener('submit', async function(e){
    e.preventDefault();
    const usuario = document.getElementById('usuario').value.trim();
    const correo = document.getElementById('correo').value.trim();
    const emailOk = /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(correo);

    if(!usuario || !emailOk){
      errorMsg.textContent = 'Revisa tu usuario y correo antes de continuar.';
      errorMsg.style.display = 'block';
      return;
    }

    submitBtn.disabled = true;
    submitBtn.textContent = 'Enviando...';

    try {
      const resp = await fetch('/api/registro', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({usuario, correo})
      });
      const data = await resp.json();

      if (!resp.ok || !data.ok) {
        throw new Error(data.error || 'No se pudo registrar');
      }

      errorMsg.style.display = 'none';
      document.getElementById('outUsuario').textContent = usuario;
      document.getElementById('outCorreo').textContent = correo;
      form.style.display = 'none';
      confirm.style.display = 'block';
    } catch (err) {
      errorMsg.textContent = 'No se pudo conectar con el servidor. Intenta de nuevo.';
      errorMsg.style.display = 'block';
    } finally {
      submitBtn.disabled = false;
      submitBtn.textContent = 'Entrar';
    }
  });

  document.getElementById('again').addEventListener('click', function(){
    form.reset();
    confirm.style.display = 'none';
    form.style.display = 'block';
  });
</script>

</body>
</html>
